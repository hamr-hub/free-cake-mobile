meta:
  title: "Free Cake MVP 技术方案"
  platform: "web"
  task_id: "free-cake-mvp"
  version: "1.0.0"
  requirement_version: "1.0.0"
  requirement_confidence: "high"
  business_goal: "构建村镇 AI 蛋糕活动平台，以免费蛋糕活动获客，通过付费转化与私域复购实现盈利"

scope:
  in_scope:
    - "C 端 H5 参赛页（AI 出图/投票/排行/领奖）"
    - "B 端运营后台（活动/赛区/风控/排产/核销/库存/门店/报表）"
    - "后端 API 服务（Rust Axum）"
    - "MySQL + Redis 数据层"
  out_of_scope:
    - "微信小程序（MVP 阶段仅 H5）"
    - "ROS2 设备自动生产"
    - "人员考勤与薪资核算"
    - "多赛区管理"
    - "自动排产"

global_constraints:
  - "B 端统一决策，C 端只执行"
  - "所有免费权益必须标准化"
  - "核销幂等控制"
  - "投票风控实时拦截"
  - "审计日志必须覆盖扣票/改票/手动加名额/重置核销码"

