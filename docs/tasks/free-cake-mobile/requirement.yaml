meta:
  title: "Free Cake Mobile - C端移动应用需求"
  platform: "mobile"
  task_id: "free-cake-mobile"
  version: "1.0.0"
  requirement_confidence: "high"
  business_goal: "村镇用户通过移动端参与AI蛋糕设计、投票、领奖核销全流程，实现C端触达闭环"

scope:
  in_scope:
    - "React Native 移动应用（iOS + Android）"
    - "用户认证与赛区校验"
    - "AI 蛋糕生成与参赛发布"
    - "投票交互与排行榜"
    - "领奖核销码与状态追踪"
    - "我的页面（作品/投票/领奖）"
    - "分享海报生成"
  out_of_scope:
    - "微信小程序（已有 H5 覆盖）"
    - "门店核销端（独立应用）"
    - "B端运营后台（已完成）"
    - "ROS2 设备控制"

acceptance_criteria:
  - ac_id: "AC-01"
    description: "用户登录与赛区校验"
    validation: "手机号验证码登录，自动匹配赛区，超出10km提示暂未开放"
    priority: "P0"
  - ac_id: "AC-02"
    description: "AI蛋糕生成"
    validation: "提交需求30秒内展示5张效果图，失败友好提示，每小时限5次"
    priority: "P0"
  - ac_id: "AC-03"
    description: "作品发布与分享"
    validation: "3步内完成发布，自动生成分享海报，作品立即入排行榜"
    priority: "P0"
  - ac_id: "AC-04"
    description: "投票交互"
    validation: "每日3票限制，实时更新排行，风控拦截提示原因"
    priority: "P0"
  - ac_id: "AC-05"
    description: "排行榜展示"
    validation: "有效票排序Top，缓存3-10s，赛区筛选"
    priority: "P0"
  - ac_id: "AC-06"
    description: "领奖核销"
    validation: "Top100获奖通知+二维码领奖码，核销状态可查"
    priority: "P0"
  - ac_id: "AC-07"
    description: "iOS & Android双端一致性"
    validation: "功能一致，平台UI适配，核心交互≤3-5步"
    priority: "P0"

constraints:
  - "React Native 跨端（一套代码双端运行）"
  - "复用现有 Rust Axum API"
  - "支持 iOS 14+ 和 Android 8+"
  - "村镇弱网环境下核心操作可用"
  - "冷启动 ≤ 3秒"
  - "内存占用 ≤ 150MB"
