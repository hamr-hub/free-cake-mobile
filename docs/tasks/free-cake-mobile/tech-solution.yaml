api:
  - name: "auth_login"
    layer: "backend"
    endpoint: "/api/auth/login"
    method: "POST"
    request_schema:
      phone: "string"
      verify_code: "string"
    response_schema:
      token: "string"
      user_id: "number"
      role: "string"
      region_id: "number?"
    error_codes:
      - code: "401"
        meaning: "验证码错误"
        handling: "提示重新输入"
      - code: "429"
        meaning: "验证码发送过于频繁"
        handling: "提示等待后重试"
    timeout_ms: 5000

  - name: "auth_send_code"
    layer: "backend"
    endpoint: "/api/auth/send-code"
    method: "POST"
    request_schema:
      phone: "string"
    response_schema:
      success: "boolean"
      expire_in: "number"
    error_codes:
      - code: "429"
        meaning: "发送过于频繁"
        handling: "提示等待"
    timeout_ms: 3000

  - name: "entries_generate"
    layer: "backend"
    endpoint: "/api/activities/{id}/entries/generate"
    method: "POST"
    request_schema:
      scene: "string"
      theme: "string"
      blessing: "string"
      color_preference: "string"
      style: "string"
    response_schema:
      generation_id: "number"
      images: "string[]"
      template_ids: "number[]"
    error_codes:
      - code: "429"
        meaning: "AI生成频率限制"
        handling: "提示稍后重试"
      - code: "503"
        meaning: "AI服务不可用"
        handling: "降级提示"
    timeout_ms: 30000

  - name: "entry_submit"
    layer: "backend"
    endpoint: "/api/activities/{id}/entries"
    method: "POST"
    request_schema:
      selected_generation_id: "number"
      selected_template_id: "number"
      title: "string"
    response_schema:
      entry_id: "number"
      share_code: "string"
    error_codes:
      - code: "400"
        meaning: "已参赛/活动未开放"
        handling: "提示规则"
      - code: "403"
        meaning: "不在服务范围"
        handling: "提示赛区限制"
    timeout_ms: 5000

  - name: "vote_cast"
    layer: "backend"
    endpoint: "/api/entries/{id}/vote"
    method: "POST"
    request_schema:
      activity_id: "number"
    response_schema:
      vote_id: "number"
      vote_status: "string"
      remaining_votes: "number"
    error_codes:
      - code: "429"
        meaning: "投票次数已用完"
        handling: "提示剩余票数"
      - code: "403"
        meaning: "风控拦截"
        handling: "提示票数冻结"
    timeout_ms: 3000

  - name: "activity_rank"
    layer: "backend"
    endpoint: "/api/activities/{id}/rank"
    method: "GET"
    request_schema:
      page: "number"
      page_size: "number"
    response_schema:
      entries: "RankedEntry[]"
      total: "number"
    timeout_ms: 3000

  - name: "activity_detail"
    layer: "backend"
    endpoint: "/api/activities/{id}"
    method: "GET"
    response_schema:
      id: "number"
      name: "string"
      status: "string"
      region_id: "number"
      registration_start_at: "string"
      voting_start_at: "string"
      voting_end_at: "string"
    timeout_ms: 3000

  - name: "user_profile"
    layer: "backend"
    endpoint: "/api/users/me"
    method: "GET"
    response_schema:
      user_id: "number"
      phone: "string"
      region_id: "number"
      entries: "Entry[]"
      votes: "VoteRecord[]"
      redeem_codes: "RedeemCode[]"
    timeout_ms: 3000

  - name: "redeem_detail"
    layer: "backend"
    endpoint: "/api/redeem/{code}"
    method: "GET"
    response_schema:
      code: "string"
      order_id: "number"
      status: "string"
      expire_at: "string"
      store_address: "string"
      store_distance: "number"
    timeout_ms: 3000

tracking:
  - event: "mobile_app_opened"
    type: "action"
    when: "用户打开APP"
    params:
      platform: "string"
      region_id: "number?"
  - event: "mobile_entry_created"
    type: "action"
    when: "移动端用户提交参赛作品"
    params:
      activity_id: "number"
      entry_id: "number"
  - event: "mobile_vote_casted"
    type: "action"
    when: "移动端用户投票"
    params:
      activity_id: "number"
      entry_id: "number"
  - event: "mobile_redeem_viewed"
    type: "action"
    when: "用户查看领奖码"
    params:
      redeem_code: "string"
  - event: "mobile_share_clicked"
    type: "action"
    when: "用户点击分享"
    params:
      entry_id: "number"
      share_channel: "string"

flags:
  - name: "enable_ai_generation"
    source: "config"
    default: true
    description: "是否启用AI蛋糕生成功能"
    priority: 1
  - name: "max_votes_per_day"
    source: "config"
    default: 3
    description: "每日投票上限"
    priority: 1
  - name: "ai_generation_rate_limit"
    source: "config"
    default: 5
    description: "AI生成每小时限制次数"
    priority: 2
  - name: "enable_location_check"
    source: "config"
    default: true
    description: "是否启用定位赛区校验"
    priority: 2

risks:
  - level: "P1"
    description: "iOS/Android原生编译环境缺失"
    mitigation: "使用Expo云编译服务或本地配置对应SDK"
  - level: "P1"
    description: "村镇弱网环境API请求超时"
    mitigation: "请求重试机制+离线缓存降级+领奖码本地存储"
  - level: "P1"
    description: "定位权限用户拒绝导致赛区匹配失败"
    mitigation: "提供手动选择赛区降级方案"
  - level: "P2"
    description: "React Native新架构兼容性问题"
    mitigation: "锁定RN 0.76+版本，使用Fabric组件"

validation:
  acceptance:
    - ac_id: "AC-01"
      validation_method: "E2E测试：手机号登录→赛区校验→超出范围提示"
      test_command: "cd mobile && npx jest -- __tests__/screens/LoginScreen.test.tsx"
    - ac_id: "AC-02"
      validation_method: "E2E测试：AI生成表单→5图展示→选图发布"
      test_command: "cd mobile && npx jest -- __tests__/screens/GenerateScreen.test.tsx"
    - ac_id: "AC-03"
      validation_method: "单元测试：作品发布流程+分享海报"
      test_command: "cd mobile && npx jest -- __tests__/screens/PublishScreen.test.tsx"
    - ac_id: "AC-04"
      validation_method: "单元测试：投票限频+风控拦截+排行刷新"
      test_command: "cd mobile && npx jest -- __tests__/hooks/useVote.test.ts"
    - ac_id: "AC-05"
      validation_method: "单元测试：排行榜数据展示+赛区筛选"
      test_command: "cd mobile && npx jest -- __tests__/screens/RankScreen.test.tsx"
    - ac_id: "AC-06"
      validation_method: "单元测试：领奖码生成+二维码展示+核销状态"
      test_command: "cd mobile && npx jest -- __tests__/screens/RedeemScreen.test.tsx"
    - ac_id: "AC-07"
      validation_method: "E2E测试：iOS/Android双端功能一致性"
      test_command: "cd mobile && npx jest -- __tests__/navigation/AppNavigator.test.tsx"
  rollback:
    strategy: "feature flag控制，AI生成/定位校验可独立开关，异常时关闭回退到H5"
    monitoring: "核心操作成功率监控，弱网环境日志上报"
