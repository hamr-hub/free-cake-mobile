api:
  - name: "auth_login"
    layer: "backend"
    endpoint: "/api/auth/login"
    method: "POST"
    request_schema:
      phone: "string"
      verify_code: "string"
    response_schema:
      token: "string"
      user_id: "number"
      role: "string"
    error_codes:
      - code: "401"
        meaning: "验证码错误"
        handling: "提示用户重新输入"
      - code: "429"
        meaning: "验证码发送过于频繁"
        handling: "提示等待后重试"
    timeout_ms: 5000

  - name: "activities_list"
    layer: "backend"
    endpoint: "/api/activities"
    method: "GET"
    request_schema:
      page: "number"
      page_size: "number"
      status: "string?"
      region_id: "number?"
    response_schema:
      list: "Activity[]"
      total: "number"
    error_codes:
      - code: "500"
        meaning: "服务端异常"
        handling: "Toast 提示"
    timeout_ms: 3000

  - name: "activity_create"
    layer: "backend"
    endpoint: "/api/activities"
    method: "POST"
    request_schema:
      region_id: "number"
      name: "string"
      registration_start_at: "string"
      registration_end_at: "string"
      voting_start_at: "string"
      voting_end_at: "string"
      max_winner_count: "number"
      rules: "ActivityRules"
    response_schema:
      id: "number"
      status: "string"
    error_codes:
      - code: "400"
        meaning: "参数校验失败"
        handling: "表单错误提示"
      - code: "403"
        meaning: "无权限"
        handling: "跳转登录"
    timeout_ms: 5000

  - name: "entries_generate"
    layer: "backend"
    endpoint: "/api/activities/{id}/entries/generate"
    method: "POST"
    request_schema:
      scene: "string"
      theme: "string"
      blessing: "string"
      color_preference: "string"
      style: "string"
    response_schema:
      generation_id: "number"
      images: "string[]"
      template_ids: "number[]"
    error_codes:
      - code: "429"
        meaning: "AI 生成频率限制"
        handling: "提示稍后重试"
      - code: "503"
        meaning: "AI 服务不可用"
        handling: "降级提示"
    timeout_ms: 30000

  - name: "entry_submit"
    layer: "backend"
    endpoint: "/api/activities/{id}/entries"
    method: "POST"
    request_schema:
      selected_generation_id: "number"
      selected_template_id: "number"
      title: "string"
    response_schema:
      entry_id: "number"
      share_code: "string"
    error_codes:
      - code: "400"
        meaning: "已参赛/活动未开放"
        handling: "提示规则"
      - code: "403"
        meaning: "不在服务范围"
        handling: "提示赛区限制"
    timeout_ms: 5000

  - name: "vote_cast"
    layer: "backend"
    endpoint: "/api/entries/{id}/vote"
    method: "POST"
    request_schema:
      activity_id: "number"
    response_schema:
      vote_id: "number"
      vote_status: "string"
      remaining_votes: "number"
    error_codes:
      - code: "429"
        meaning: "投票次数已用完"
        handling: "提示剩余票数"
      - code: "403"
        meaning: "风控拦截"
        handling: "提示票数冻结"
    timeout_ms: 3000

  - name: "activity_rank"
    layer: "backend"
    endpoint: "/api/activities/{id}/rank"
    method: "GET"
    request_schema:
      page: "number"
      page_size: "number"
    response_schema:
      entries: "RankedEntry[]"
      total: "number"
    error_codes:
      - code: "500"
        meaning: "服务端异常"
        handling: "重试"
    timeout_ms: 3000

  - name: "activity_settle"
    layer: "backend"
    endpoint: "/api/activities/{id}/settle"
    method: "POST"
    request_schema:
      force: "boolean?"
    response_schema:
      winner_count: "number"
      order_count: "number"
      redeem_code_count: "number"
    error_codes:
      - code: "400"
        meaning: "活动未到结算时间"
        handling: "提示等待"
      - code: "409"
        meaning: "结算已执行"
        handling: "展示已有结果"
    timeout_ms: 10000

  - name: "order_schedule"
    layer: "backend"
    endpoint: "/api/orders/{id}/schedule"
    method: "POST"
    request_schema:
      store_id: "number"
      scheduled_date: "string"
      priority: "number?"
    response_schema:
      batch_id: "number"
      task_ids: "number[]"
    error_codes:
      - code: "400"
        meaning: "排产参数错误"
        handling: "表单提示"
      - code: "409"
        meaning: "产能不足"
        handling: "提示延后排期"
    timeout_ms: 5000

  - name: "redeem_verify"
    layer: "backend"
    endpoint: "/api/redeem/verify"
    method: "POST"
    request_schema:
      redeem_code: "string"
      phone: "string"
      store_id: "number"
    response_schema:
      success: "boolean"
      order_id: "number"
      fail_reason: "string?"
    error_codes:
      - code: "400"
        meaning: "核销码无效/已使用"
        handling: "提示失败原因"
      - code: "410"
        meaning: "核销码已过期"
        handling: "提示已过期"
    timeout_ms: 3000

  - name: "store_inventory"
    layer: "backend"
    endpoint: "/api/stores/{id}/inventory"
    method: "GET"
    request_schema:
      category: "string?"
    response_schema:
      items: "InventoryItem[]"
      alerts: "InventoryAlert[]"
    error_codes:
      - code: "500"
        meaning: "服务端异常"
        handling: "重试"
    timeout_ms: 3000

  - name: "dashboard_stats"
    layer: "backend"
    endpoint: "/api/dashboard/stats"
    method: "GET"
    request_schema: {}
    response_schema:
      active_regions: "number"
      today_entries: "number"
      today_votes: "number"
      risk_vote_ratio: "number"
      pending_production: "number"
      today_redeem_rate: "number"
      low_inventory_stores: "number"
    error_codes:
      - code: "500"
        meaning: "服务端异常"
        handling: "重试"
    timeout_ms: 5000

tracking:
  - event: "entry_created"
    type: "action"
    when: "用户提交参赛作品"
    params:
      activity_id: "number"
      entry_id: "number"
      template_id: "number"
  - event: "vote_casted"
    type: "action"
    when: "用户投票"
    params:
      activity_id: "number"
      entry_id: "number"
      vote_status: "string"
  - event: "activity_settled"
    type: "system"
    when: "活动自动结算"
    params:
      activity_id: "number"
      winner_count: "number"
  - event: "redeem_success"
    type: "action"
    when: "用户到店核销成功"
    params:
      order_id: "number"
      store_id: "number"
  - event: "risk_event_detected"
    type: "system"
    when: "风控检测到异常"
    params:
      activity_id: "number"
      risk_type: "string"
      risk_level: "string"
  - event: "ai_generation_requested"
    type: "action"
    when: "用户请求 AI 生成"
    params:
      scene: "string"
      activity_id: "number"
  - event: "production_task_created"
    type: "system"
    when: "生产任务创建"
    params:
      batch_id: "number"
      store_id: "number"
  - event: "inventory_low"
    type: "system"
    when: "库存低于安全阈值"
    params:
      store_id: "number"
      item_id: "number"

flags:
  - name: "enable_auto_settle"
    source: "config"
    default: true
    description: "是否启用自动开奖结算"
    priority: 1
  - name: "max_votes_per_day"
    source: "config"
    default: 3
    description: "每日投票上限"
    priority: 1
  - name: "risk_control_enabled"
    source: "config"
    default: true
    description: "是否启用投票风控"
    priority: 1
  - name: "ai_generation_rate_limit"
    source: "config"
    default: 5
    description: "AI 生成每小时限制次数"
    priority: 2

risks:
  - level: "P1"
    description: "AI 生成图不可直接生产，需映射到可生产模板+装饰参数"
    mitigation: "AI 设计中心增加模板映射逻辑，生成结果标记可生产等级"
  - level: "P1"
    description: "村镇网络不稳定，核销端需支持离线短时缓存"
    mitigation: "门店核销端实现离线短时缓存，恢复后自动补传"
  - level: "P1"
    description: "投票峰值可能影响排行榜缓存一致性"
    mitigation: "Redis 缓存 3-10s 刷新，投票流水与排行榜分离展示"
  - level: "P1"
    description: "食品安全合规，需建立完整 SOP 和审计链路"
    mitigation: "原料批次追踪、过期自动禁用、关键流程双人复核"
  - level: "P0"
    description: "刷票导致公信力崩盘"
    mitigation: "多维度风控（手机号/OpenID/设备指纹/IP/定位），异常票冻结+人工复核"

validation:
  acceptance:
    - ac_id: "AC-01"
      validation_method: "E2E 测试：用户登录→赛区校验→AI 生成→选择→发布"
      test_command: "cargo test --test api -- entry_generate"
    - ac_id: "AC-02"
      validation_method: "单元测试：投票限流+风控冻结+有效票计算"
      test_command: "cargo test --lib -- vote"
    - ac_id: "AC-03"
      validation_method: "集成测试：投票截止→自动结算→Top100 生成→订单创建"
      test_command: "cargo test --test api -- settlement"
    - ac_id: "AC-04"
      validation_method: "单元测试：核销码校验+幂等控制+过期处理"
      test_command: "cargo test --lib -- redeem"
    - ac_id: "AC-05"
      validation_method: "E2E 测试：创建活动→配置规则→状态流转→模板复用"
      test_command: "cargo test --test api -- activity_crud"
    - ac_id: "AC-06"
      validation_method: "E2E 测试：异常投票→风控检测→冻结/解冻/扣票"
      test_command: "cargo test --test api -- risk_control"
  rollback:
    strategy: "feature flag 控制，异常时关闭自动结算/风控，回退到人工模式"
    monitoring: "核心链路 SLA 99.9%，开奖任务重试，核销幂等"
