<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F0FDF4"/>
  <text x="70" y="80" font-size="40" font-family="Arial" font-weight="700" fill="#14532D">门店生产与核销流程图</text>
  <text x="70" y="120" font-size="20" font-family="Arial" fill="#4B5563">任务下发、门店执行、用户到店领取</text>

  <g font-family="Arial" font-size="24" fill="#111827">
    <rect x="90" y="320" width="190" height="110" rx="24" fill="#BFDBFE"/><text x="125" y="385">接收生产任务</text>
    <rect x="350" y="320" width="190" height="110" rx="24" fill="#A7F3D0"/><text x="392" y="385">设备执行</text>
    <rect x="610" y="320" width="190" height="110" rx="24" fill="#FDE68A"/><text x="650" y="385">完工入库</text>
    <rect x="870" y="320" width="190" height="110" rx="24" fill="#FBCFE8"/><text x="905" y="385">用户到店</text>
    <rect x="1130" y="320" width="190" height="110" rx="24" fill="#FDBA74"/><text x="1172" y="385">扫码核销</text>
    <rect x="1390" y="320" width="140" height="110" rx="24" fill="#86EFAC"/><text x="1418" y="385">完成</text>
  </g>

  <g stroke="#9CA3AF" stroke-width="8" stroke-linecap="round">
    <path d="M280 375H350"/>
    <path d="M540 375H610"/>
    <path d="M800 375H870"/>
    <path d="M1060 375H1130"/>
    <path d="M1320 375H1390"/>
  </g>

  <rect x="250" y="560" width="1100" height="180" rx="28" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2"/>
  <text x="300" y="625" font-size="30" font-family="Arial" font-weight="700" fill="#166534">异常兜底</text>
  <text x="300" y="675" font-size="24" font-family="Arial" fill="#374151">设备失败 → 人工接管生产 ｜ 核销失败 → 门店复核手机号与领奖码 ｜ 超时未领 → 自动失效或重发</text>
</svg>
