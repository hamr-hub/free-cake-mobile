meta:
  title: "Free Cake Mobile - C端移动应用技术方案"
  platform: "mobile"
  task_id: "free-cake-mobile"
  version: "1.0.0"
  requirement_version: "1.0.0"
  requirement_confidence: "high"
  business_goal: "村镇用户通过移动端参与AI蛋糕设计、投票、领奖核销全流程，实现C端触达闭环"

scope:
  in_scope:
    - "React Native 移动应用（iOS + Android）"
    - "用户认证与赛区校验"
    - "AI 蛋糕生成与参赛发布"
    - "投票交互与排行榜"
    - "领奖核销码与状态追踪"
    - "我的页面（作品/投票/领奖）"
    - "分享海报生成"
  out_of_scope:
    - "微信小程序"
    - "门店核销端"
    - "B端运营后台"
    - "ROS2 设备控制"

global_constraints:
  - "iOS 和 Android 功能完全一致"
  - "核心交互不超过3-5步"
  - "弱网环境核心路径可用"
  - "领奖码支持离线短时缓存"
  - "冷启动时间 ≤ 3秒"

